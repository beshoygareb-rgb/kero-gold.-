<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Kero Gold | Premium Live Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #000;
        --gold: #d4af37;
        --border: 1px solid rgba(255, 255, 255, 0.1);
    }
    body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
    
    .container { width: 100%; flex-grow: 1; display: flex; flex-direction: column; padding: 5px; }
    
    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        border: var(--border);
        border-radius: 15px;
        padding: 15px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }
    
    h1 { color: var(--gold); text-align: center; font-size: 24px; margin: 5px 0; }
    .live-status { text-align: center; font-size: 12px; margin-bottom: 10px; opacity: 0.7; }
    .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
    .tab { flex: 1; padding: 10px; border-radius: 10px; text-align: center; border: var(--border); }
    .tab.active { background: var(--gold); color: #000; font-weight: bold; }
    
    .header-row { display: flex; justify-content: space-between; padding: 0 10px; font-size: 11px; color: #888; margin-bottom: 5px; }
    .price-card { background: rgba(255, 255, 255, 0.05); border: var(--border); padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .highlight { border: 1px solid var(--gold); }
    .val { color: #00ff88; font-weight: bold; font-family: monospace; font-size: 16px; }
    
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: auto; }
    .box { padding: 10px; border-radius: 10px; text-align: center; border: var(--border); font-size: 13px; }
</style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h1>KERO GOLD</h1>
        <div class="live-status">• مباشر من سوق الصاغة والبورصة</div>
        
        <div class="tabs">
            <div id="btn-gold" class="tab active" onclick="setMode('gold')">أسعار الذهب</div>
            <div id="btn-silver" class="tab" onclick="setMode('silver')">أسعار الفضة</div>
        </div>

        <div class="header-row">
            <span>العيار في مصر</span>
            <span>بيع للمستهلك</span>
            <span>شراء من المستهلك</span>
        </div>

        <div id="list"></div>

        <div class="bottom-grid">
            <div class="box" style="border-color:#ff3e3e;">سعر دولار البنوك<br><b id="usd" style="color:#ff3e3e;">49.49</b></div>
            <div class="box" style="border-color:#00ff88;">الشاشة العالمية<br><b id="ounce" style="color:#00ff88;">4082.43</b></div>
        </div>
    </div>
</div>

<script>
    let mode = 'gold';
    const prices = {
        gold: { 'عيار ٢٤': [6621.75, 6565.10], 'عيار ٢١': [5796.65, 5745.41], 'عيار ١٨': [4968.71, 4924.40], 'عيار ١٤': [3865.10, 3827.81], 'عيار ١٢': [3311.18, 3282.38] },
        silver: { 'فضة ٩٩٩': [45.20, 44.50], 'فضة ٩٢٥': [42.10, 41.60], 'فضة ٩٠٠': [39.80, 39.20], 'فضة ٨٠٠': [35.50, 34.90] }
    };

    function setMode(m) {
        mode = m;
        document.getElementById('btn-gold').className = 'tab ' + (m==='gold'?'active':'');
        document.getElementById('btn-silver').className = 'tab ' + (m==='silver'?'active':'');
        render();
    }

    function render() {
        let list = document.getElementById('list');
        list.innerHTML = '';
        for (let key in prices[mode]) {
            let row = document.createElement('div');
            row.className = 'price-card' + (key.includes('٢١') ? ' highlight' : '');
            row.innerHTML = `<span>${key}</span><span class="val">${prices[mode][key][0]}</span><span class="val" style="color:#ff3e3e">${prices[mode][key][1]}</span>`;
            list.appendChild(row);
        }
    }
    render();
</script>
</body>
</html>
