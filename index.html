<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مظبط اللوجو - KERO GOLD</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        .box { border: 2px solid #d4af37; padding: 30px; border-radius: 20px; }
        button { background: #d4af37; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>مظبط اللوجو (أبعاد 512x512)</h1>
        <input type="file" id="upload" accept="image/*">
        <br><br>
        <button onclick="fixLogo()">تظبيط وقص الصورة</button>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        function fixLogo() {
            const file = document.getElementById('upload').files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    // هنا بنجبر الصورة تكون مربعة 512x512
                    canvas.width = 512;
                    canvas.height = 512;
                    const ctx = canvas.getContext('2d');
                    // تمديد الصورة عشان تملأ المربع
                    ctx.drawImage(img, 0, 0, 512, 512);
                    
                    const link = document.createElement('a');
                    link.download = 'kero_logo_512.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
