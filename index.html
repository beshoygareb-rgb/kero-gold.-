<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KERO GOLD</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --bg: #000; --gold: #d4af37; --card-bg: rgba(255, 255, 255, 0.05); }
    body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; height: 100vh; box-sizing: border-box; }
    
    .container { width: 100%; height: 100%; display: flex; flex-direction: column; }
    
    .glass-card {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 25px;
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    h1 { color: var(--gold); text-align: center; margin: 0 0 15px 0; font-size: 28px; font-weight: 900; }
    
    /* المربعات الانسيابية العريضة */
    .price-card { 
        background: rgba(255, 255, 255, 0.04); 
        border: 1px solid rgba(255, 255, 255, 0.1); 
        padding: 25px 20px; 
        border-radius: 20px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 15px;
    }
    
    .highlight { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.08); }
    
    .val { color: #00ff88; font-weight: 700; font-size: 20px; }
    
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: auto; padding-top: 10px; }
    .box { padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 16px; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h1>KERO GOLD</h1>
        <div id="list"></div>
        <div class="bottom-grid">
            <div class="box">دولار البنوك<br><b style="color:#ff3e3e; font-size: 20px;">49.49</b></div>
            <div class="box">الشاشة العالمية<br><b style="color:#00ff88; font-size: 20px;">4082.43</b></div>
        </div>
    </div>
</div>

<script>
    const prices = { 'عيار ٢٤': [6621.75, 6565.10], 'عيار ٢١': [5796.65, 5745.41], 'عيار ١٨': [4968.71, 4924.40], 'عيار ١٤': [3865.10, 3827.81], 'عيار ١٢': [3311.18, 3282.38] };
    let list = document.getElementById('list');
    for (let key in prices) {
        let row = document.createElement('div');
        row.className = 'price-card' + (key.includes('٢١') ? ' highlight' : '');
        row.innerHTML = `<span style="font-weight:bold;">${key}</span><span class="val">${prices[key][0]}</span><span class="val" style="color:#ff3e3e">${prices[key][1]}</span>`;
        list.appendChild(row);
    }
</script>
</body>
</html>
