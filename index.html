<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KERO GOLD LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root { --bg: #000; --gold: #d4af37; --card-bg: rgba(255, 255, 255, 0.05); }
    body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; height: 100vh; box-sizing: border-box; }
    
    .container { width: 100%; height: 100%; display: flex; flex-direction: column; }
    
    .glass-card {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 25px;
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    h1 { color: var(--gold); text-align: center; margin: 0 0 15px 0; font-size: 28px; font-weight: 900; }
    
    /* التصميم الانسيابي الموت */
    .price-card { 
        background: rgba(255, 255, 255, 0.04); 
        border: 1px solid rgba(255, 255, 255, 0.1); 
        padding: 25px 20px; 
        border-radius: 20px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 15px;
    }
    
    .highlight { border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.08); }
    
    .val { color: #00ff88; font-weight: 700; font-size: 20px; font-family: monospace; }
</style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <h1>KERO GOLD</h1>
        
        <div class="price-card highlight">
            <span style="font-weight:bold;">عيار ٢١</span>
            <span id="price-21" class="val">جارٍ الاتصال...</span>
        </div>
        
        <div class="price-card">
            <span style="font-weight:bold;">عيار ٢٤</span>
            <span id="price-24" class="val">جارٍ الاتصال...</span>
        </div>
        
        <div class="price-card">
            <span style="font-weight:bold;">عيار ١٨</span>
            <span id="price-18" class="val">جارٍ الاتصال...</span>
        </div>
    </div>
</div>

<script>
    async function updateGoldPrice() {
        try {
            // سحب البيانات من السيرفر
            let response = await fetch('https://api.gold-api.com/v1/XAU/EGP');
            let data = await response.json();
            
            // حساب الأسعار بناءً على سعر السوق الحالي
            let price24 = (data.price / 31.1035).toFixed(2);
            let price21 = (price24 * 0.875).toFixed(2);
            let price18 = (price24 * 0.75).toFixed(2);

            document.getElementById('price-21').innerText = price21;
            document.getElementById('price-24').innerText = price24;
            document.getElementById('price-18').innerText = price18;
        } catch (error) {
            document.getElementById('price-21').innerText = "خطأ";
        }
    }

    // التحديث أوتوماتيك كل 15 دقيقة
    updateGoldPrice();
    setInterval(updateGoldPrice, 900000);
</script>
</body>
</html>

    body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
    /* الـ iframe هنا سيعرض صفحة الأسعار الحية داخل تصميمك */
    iframe { 
        width: 100%; 
        height: 100%; 
        border: none; 
    }
</style>

<body>
    <iframe src="https://www.gold-price-today.com/eg/gold-price-egypt"></iframe>
</body>
</html>
